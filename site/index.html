<body>
    <main>
        <div class="phone-showcase">
            <img src="landing.png" alt="Instagram App Showcase">
        </div>

        <div class="auth-forms">
            <div class="panel login">
                <i class="fab fa-instagram logo" style="font-size: 50px; margin-bottom: 20px;"></i>
                <!-- Using text logo or font for "Instagram" cursive? The image shows white cursive "Instagram" text. Using the font we loaded. -->
                <h1
                    style="font-family: 'Grand Hotel', cursive; font-size: 3rem; margin-bottom: 30px; font-weight: normal;">
                    Instagram</h1>

                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="email" placeholder="Número de celular, nome de usuário ou email"
                            aria-label="Phone number, username or email address" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Senha" aria-label="Password" required>
                    </div>

                    <button type="submit" class="btn-primary">Entrar</button>

                    <div class="divider">
                        <div class="line"></div>
                        <div class="text"></div>
                        <div class="line"></div>
                    </div>

                    <button type="button" class="btn-facebook">
                        <i class="fab fa-facebook-square"></i> Entrar com o Facebook
                    </button>
                    <a href="https://www.instagram.com/accounts/password/reset/" class="forgot-password">Esqueceu a senha?</a>
                </form>
            </div>

            <div class="panel signup">
                <p>Não tem uma conta? <a href="https://www.instagram.com/accounts/emailsignup/">Cadastre-se</a></p>
            </div>
